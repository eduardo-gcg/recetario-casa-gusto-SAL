<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7D825F">
<title>Recetario Casa Gusto</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF8F4;--surface:#FFFFFF;--surface2:#F2EDE4;
  --olive:#7D825F;--olive-dark:#5a5e44;--olive-light:#a0a47e;
  --beige:#FAF8F4;--beige2:#E4E0D5;
  --brown:#866748;--brown-dark:#452C1B;
  --text:#2a2015;--text2:#5a4e3a;--text3:#9a8e7a;
  --border:#ddd8cc;--r:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;overflow:hidden}

/* LOGIN */
#login-view{
  position:fixed;inset:0;background:var(--olive);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;padding:24px;
  background-image:radial-gradient(ellipse at 20% 80%,rgba(134,103,72,0.3) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(250,248,244,0.08) 0%,transparent 50%);
}
#login-view.hidden{display:none}
.login-logo-img{width:280px;max-width:80vw;margin:0 auto 12px;display:block}
.login-sub{color:rgba(255,255,255,0.55);font-size:11px;margin-bottom:36px;letter-spacing:1.5px;text-transform:uppercase;text-align:center}
.login-card{background:#fff;border-radius:24px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(69,44,27,0.25)}
.login-card h2{font-size:15px;color:var(--text2);margin-bottom:6px;font-weight:600}
.login-card p{font-size:12px;color:var(--text3);margin-bottom:24px}
.inp-group{margin-bottom:16px}
.inp-group label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600}
.inp-group input{
  width:100%;height:52px;border:1.5px solid var(--border);border-radius:14px;
  padding:0 18px;font-size:20px;color:var(--text);outline:none;
  background:var(--bg);-webkit-appearance:none;font-family:'Sora',sans-serif;letter-spacing:4px;
}
.inp-group input:focus{border-color:var(--olive);background:#fff;box-shadow:0 0 0 3px rgba(125,130,95,0.12)}
.login-btn{
  width:100%;height:52px;background:var(--olive);border:none;border-radius:14px;
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;
  font-family:'Sora',sans-serif;transition:background .2s,transform .1s;
}
.login-btn:active{background:var(--olive-dark);transform:scale(0.98)}
.login-error{color:#c0392b;font-size:12px;text-align:center;margin-top:12px;min-height:18px}

/* HEADER */
#list-view{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}
.hdr{background:var(--olive);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(69,44,27,0.15)}
.hdr-logo-img{height:36px;display:block}
.hdr-sub{color:rgba(255,255,255,0.5);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-left:4px;align-self:flex-end;padding-bottom:2px}
.hdr-spacer{flex:1}
.hdr-user{color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;white-space:nowrap;padding:6px 10px;border-radius:8px;transition:background .2s}
.hdr-user:hover{background:rgba(255,255,255,0.12)}

.search-bar{background:var(--olive);padding:0 14px 14px;display:flex;gap:8px;flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap input{
  width:100%;height:42px;padding:0 14px 0 38px;border:none;border-radius:21px;
  font-size:14px;background:rgba(255,255,255,0.18);color:#fff;
  outline:none;-webkit-appearance:none;font-family:'Sora',sans-serif;
}
.search-wrap input::placeholder{color:rgba(255,255,255,0.5)}
.search-wrap input:focus{background:rgba(255,255,255,0.26)}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.65);pointer-events:none}
.filter-btn{
  height:42px;padding:0 14px;border:1.5px solid rgba(255,255,255,0.3);border-radius:21px;
  background:transparent;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap;
  font-family:'Sora',sans-serif;font-weight:600;transition:all .2s;
}
.filter-btn.on{background:var(--brown);border-color:var(--brown)}

.filter-drawer{background:var(--surface2);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease;flex-shrink:0}
.filter-drawer.open{max-height:130px}
.chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;overflow-y:auto;max-height:130px}
.chip{padding:6px 14px;border-radius:20px;font-size:11px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif;font-weight:500;transition:all .15s}
.chip.on{background:var(--olive);color:#fff;border-color:var(--olive)}
.chip:hover:not(.on){background:var(--beige2);border-color:var(--olive-light)}

.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.res-bar{font-size:11px;color:var(--text3);padding:2px 2px 10px;font-weight:500;letter-spacing:.3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:800px){.grid{grid-template-columns:1fr 1fr 1fr 1fr}}

.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--olive);opacity:0;transition:opacity .2s}
.card:hover::before{opacity:1}
.card:active{transform:scale(0.97)}
.card:hover{box-shadow:0 4px 20px rgba(125,130,95,0.15)}
.card-cat{display:inline-block;font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(125,130,95,0.12);color:var(--olive-dark);margin-bottom:7px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:5px}
.card-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:40px;margin-bottom:12px}

/* DETAIL */
#detail-view{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-width:900px;margin:0 auto;left:0;right:0;
}
#detail-view.open{transform:translateX(0)}
.d-hdr{background:var(--olive);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(69,44,27,0.15)}
.back{background:rgba(255,255,255,0.18);border:none;color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.back:active{background:rgba(255,255,255,0.3)}
.d-title-wrap{flex:1}
.d-title{color:#fff;font-size:15px;font-weight:700;line-height:1.3}
.d-cat{color:rgba(255,255,255,0.6);font-size:11px;margin-top:3px;letter-spacing:.4px;text-transform:uppercase}
.d-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.d-hero{background:var(--olive);padding:16px 18px 24px;display:flex;flex-wrap:wrap;gap:8px}
.badge{background:rgba(255,255,255,0.18);color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.d-body{padding:18px}
.d-section{margin-bottom:24px}
.d-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--olive);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--beige2)}
.ing-table{width:100%;border-collapse:collapse}
.ing-table tr{border-bottom:1px solid var(--border)}
.ing-table tr:last-child{border-bottom:none}
.ing-table td{padding:9px 6px;font-size:13px;color:var(--text2);vertical-align:middle}
.ing-table td:first-child{color:var(--text);font-weight:500;padding-left:0}
.ing-table td:last-child{text-align:right;color:var(--olive-dark);font-weight:600;padding-right:0;white-space:nowrap}
.ing-qty{font-size:11px;color:var(--text3);margin-left:4px;font-weight:400}
.method-steps{display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--olive);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.6;padding-top:3px}
.yield-bar{background:var(--surface2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);margin-bottom:24px}
.yield-label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.yield-val{font-size:20px;font-weight:700;color:var(--olive-dark)}
.yield-unit{font-size:12px;color:var(--text3);margin-left:4px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--beige2);border-radius:2px}
</style>
</head>

const PINS_VALIDOS = ["1234","5678","9999","2025"];
let activeCategories = new Set();

function doLogin(){
  const pin = document.getElementById('pin-input').value.trim();
  const err = document.getElementById('login-err');
  if(!pin){err.textContent='Ingresa tu PIN';return}
  if(PINS_VALIDOS.includes(pin)){
    err.textContent='';
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('list-view').style.display='flex';
    initList();
  } else {
    err.textContent='PIN incorrecto. Inténtalo de nuevo.';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-input').focus();
  }
}
function doLogout(){
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('list-view').style.display='none';
  document.getElementById('pin-input').value='';
  activeCategories.clear();
}
document.getElementById('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function initList(){
  const cats = [...new Set(RECETAS.map(r=>r.categoria))].sort();
  document.getElementById('chips-container').innerHTML = cats.map(c=>
    `<div class="chip" data-cat="${c}" onclick="toggleCat('${c}')">${c}</div>`
  ).join('');
  renderList();
}
function toggleCat(cat){
  if(activeCategories.has(cat)) activeCategories.delete(cat);
  else activeCategories.add(cat);
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',activeCategories.has(ch.dataset.cat)));
  renderList();
}
function toggleFilter(){
  const drawer=document.getElementById('filter-drawer');
  const btn=document.getElementById('filter-toggle');
  const isOpen=drawer.classList.toggle('open');
  btn.classList.toggle('on',isOpen);
  btn.textContent=isOpen?'✕ Cerrar':'⚙ Filtros';
}
function renderList(){
  const q=document.getElementById('search-inp').value.toLowerCase().trim();
  let filtered=RECETAS;
  if(activeCategories.size>0) filtered=filtered.filter(r=>activeCategories.has(r.categoria));
  if(q) filtered=filtered.filter(r=>r.nombre.toLowerCase().includes(q)||r.categoria.toLowerCase().includes(q)||(r.subcategoria||'').toLowerCase().includes(q)||r.ingredientes.some(i=>i.nombre.toLowerCase().includes(q)));
  document.getElementById('res-bar').textContent=`${filtered.length} receta${filtered.length!==1?'s':''} encontrada${filtered.length!==1?'s':''}`;
  const grid=document.getElementById('recipe-grid');
  if(filtered.length===0){grid.innerHTML=`<div class="empty"><div class="empty-icon">🍽️</div><p>No se encontraron recetas</p></div>`;return}
  grid.innerHTML=filtered.map(r=>`
    <div class="card" onclick="openDetail(${r.id})">
      <div class="card-cat">${r.categoria}</div>
      <div class="card-name">${r.nombre}</div>
      <div class="card-meta">🧂 ${r.ingredientes.length} ingredientes · ${r.rendimiento} ${r.unidad}</div>
    </div>`).join('');
}
function openDetail(id){
  const r=RECETAS.find(x=>x.id===id);if(!r)return;
  document.getElementById('d-title').textContent=r.nombre;
  document.getElementById('d-cat').textContent=`${r.categoria}${r.subcategoria?' · '+r.subcategoria:''}`;
  document.getElementById('d-badges').innerHTML=`
    <div class="badge">🍽️ ${r.rendimiento} ${r.unidad}</div>
    <div class="badge">🧂 ${r.ingredientes.length} ingredientes</div>
    ${r.metodo&&r.metodo.length?`<div class="badge">📋 ${r.metodo.length} pasos</div>`:''}`;
  document.getElementById('d-yield').innerHTML=`<div class="yield-bar"><span class="yield-label">Rendimiento</span><span class="yield-val">${r.rendimiento}<span class="yield-unit">${r.unidad}</span></span></div>`;
  document.getElementById('d-ing-table').innerHTML=r.ingredientes.map(i=>`<tr><td>${i.nombre}</td><td>${i.cantidad>0?`<strong>${i.cantidad}</strong><span class="ing-qty">${i.unidad}</span>`:`<span class="ing-qty">${i.unidad}</span>`}</td></tr>`).join('');
  const ms=document.getElementById('d-method-section');
  if(r.metodo&&r.metodo.length){ms.style.display='';document.getElementById('d-method').innerHTML=r.metodo.map((p,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${p}</div></div>`).join('')}
  else ms.style.display='none';
  document.getElementById('detail-view').classList.add('open');
  document.querySelector('.d-scroll').scrollTop=0;
}
function closeDetail(){document.getElementById('detail-view').classList.remove('open')}
let touchStartX=0;
document.getElementById('detail-view').addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX},{passive:true});
document.getElementById('detail-view').addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-touchStartX>80)closeDetail()},{passive:true});
</script>
