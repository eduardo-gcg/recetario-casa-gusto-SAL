<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7D825F">
<title>Recetario Casa Gusto</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF8F4;--surface:#FFFFFF;--surface2:#F2EDE4;
  --olive:#7D825F;--olive-dark:#5a5e44;--olive-light:#a0a47e;
  --beige:#FAF8F4;--beige2:#E4E0D5;
  --brown:#866748;--brown-dark:#452C1B;
  --text:#2a2015;--text2:#5a4e3a;--text3:#9a8e7a;
  --border:#ddd8cc;--r:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;overflow:hidden}

/* LOGIN */
#login-view{
  position:fixed;inset:0;background:var(--olive);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;padding:24px;
  background-image:radial-gradient(ellipse at 20% 80%,rgba(134,103,72,0.3) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(250,248,244,0.08) 0%,transparent 50%);
}
#login-view.hidden{display:none}
.login-logo-img{width:280px;max-width:80vw;margin:0 auto 12px;display:block}
.login-sub{color:rgba(255,255,255,0.55);font-size:11px;margin-bottom:36px;letter-spacing:1.5px;text-transform:uppercase;text-align:center}
.login-card{background:#fff;border-radius:24px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(69,44,27,0.25)}
.login-card h2{font-size:15px;color:var(--text2);margin-bottom:6px;font-weight:600}
.login-card p{font-size:12px;color:var(--text3);margin-bottom:24px}
.inp-group{margin-bottom:16px}
.inp-group label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600}
.inp-group input{
  width:100%;height:52px;border:1.5px solid var(--border);border-radius:14px;
  padding:0 18px;font-size:20px;color:var(--text);outline:none;
  background:var(--bg);-webkit-appearance:none;font-family:'Sora',sans-serif;letter-spacing:4px;
}
.inp-group input:focus{border-color:var(--olive);background:#fff;box-shadow:0 0 0 3px rgba(125,130,95,0.12)}
.login-btn{
  width:100%;height:52px;background:var(--olive);border:none;border-radius:14px;
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;
  font-family:'Sora',sans-serif;transition:background .2s,transform .1s;
}
.login-btn:active{background:var(--olive-dark);transform:scale(0.98)}
.login-error{color:#c0392b;font-size:12px;text-align:center;margin-top:12px;min-height:18px}

/* HEADER */
#list-view{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}
.hdr{background:var(--olive);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(69,44,27,0.15)}
.hdr-logo-img{height:36px;display:block}
.hdr-sub{color:rgba(255,255,255,0.5);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-left:4px;align-self:flex-end;padding-bottom:2px}
.hdr-spacer{flex:1}
.hdr-user{color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;white-space:nowrap;padding:6px 10px;border-radius:8px;transition:background .2s}
.hdr-user:hover{background:rgba(255,255,255,0.12)}

.search-bar{background:var(--olive);padding:0 14px 14px;display:flex;gap:8px;flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap input{
  width:100%;height:42px;padding:0 14px 0 38px;border:none;border-radius:21px;
  font-size:14px;background:rgba(255,255,255,0.18);color:#fff;
  outline:none;-webkit-appearance:none;font-family:'Sora',sans-serif;
}
.search-wrap input::placeholder{color:rgba(255,255,255,0.5)}
.search-wrap input:focus{background:rgba(255,255,255,0.26)}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.65);pointer-events:none}
.filter-btn{
  height:42px;padding:0 14px;border:1.5px solid rgba(255,255,255,0.3);border-radius:21px;
  background:transparent;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap;
  font-family:'Sora',sans-serif;font-weight:600;transition:all .2s;
}
.filter-btn.on{background:var(--brown);border-color:var(--brown)}

.filter-drawer{background:var(--surface2);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease;flex-shrink:0}
.filter-drawer.open{max-height:130px}
.chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;overflow-y:auto;max-height:130px}
.chip{padding:6px 14px;border-radius:20px;font-size:11px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif;font-weight:500;transition:all .15s}
.chip.on{background:var(--olive);color:#fff;border-color:var(--olive)}
.chip:hover:not(.on){background:var(--beige2);border-color:var(--olive-light)}

.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.res-bar{font-size:11px;color:var(--text3);padding:2px 2px 10px;font-weight:500;letter-spacing:.3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:800px){.grid{grid-template-columns:1fr 1fr 1fr 1fr}}

.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--olive);opacity:0;transition:opacity .2s}
.card:hover::before{opacity:1}
.card:active{transform:scale(0.97)}
.card:hover{box-shadow:0 4px 20px rgba(125,130,95,0.15)}
.card-cat{display:inline-block;font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(125,130,95,0.12);color:var(--olive-dark);margin-bottom:7px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:5px}
.card-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:40px;margin-bottom:12px}

/* DETAIL */
#detail-view{
  display:none;
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:var(--bg);z-index:500;
  flex-direction:column;
}
#detail-view.open{
  display:flex;
}
.d-hdr{background:var(--olive);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(69,44,27,0.15)}
.back{background:rgba(255,255,255,0.18);border:none;color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.back:active{background:rgba(255,255,255,0.3)}
.d-title-wrap{flex:1}
.d-title{color:#fff;font-size:15px;font-weight:700;line-height:1.3}
.d-cat{color:rgba(255,255,255,0.6);font-size:11px;margin-top:3px;letter-spacing:.4px;text-transform:uppercase}
.d-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.d-hero{background:var(--olive);padding:16px 18px 24px;display:flex;flex-wrap:wrap;gap:8px}
.badge{background:rgba(255,255,255,0.18);color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.d-body{padding:18px}
.d-section{margin-bottom:24px}
.d-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--olive);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--beige2)}
.ing-table{width:100%;border-collapse:collapse}
.ing-table tr{border-bottom:1px solid var(--border)}
.ing-table tr:last-child{border-bottom:none}
.ing-table td{padding:9px 6px;font-size:13px;color:var(--text2);vertical-align:middle}
.ing-table td:first-child{color:var(--text);font-weight:500;padding-left:0}
.ing-table td:last-child{text-align:right;color:var(--olive-dark);font-weight:600;padding-right:0;white-space:nowrap}
.ing-qty{font-size:11px;color:var(--text3);margin-left:4px;font-weight:400}
.method-steps{display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--olive);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.6;padding-top:3px}
.yield-bar{background:var(--surface2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);margin-bottom:24px}
.yield-label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.yield-val{font-size:20px;font-weight:700;color:var(--olive-dark)}
.yield-unit{font-size:12px;color:var(--text3);margin-left:4px}


/* ESCALADOR */
.scaler-bar{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.scaler-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--olive);margin-bottom:10px}
.scaler-row{display:flex;align-items:center;gap:10px}
.scaler-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--olive);background:transparent;color:var(--olive);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.scaler-btn:active{background:var(--olive);color:#fff}
.scaler-input{width:65px;height:36px;border:2px solid var(--olive);border-radius:10px;text-align:center;font-size:16px;font-weight:700;color:var(--olive-dark);background:#fff;outline:none;font-family:'Sora',sans-serif}
.scaler-result{font-size:13px;color:var(--text2);flex:1;font-weight:600;color:var(--olive-dark)}



/* PROCEDIMIENTO */
.proc-section{margin-bottom:24px}
.proc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--beige2)}
.proc-header .d-section-title{margin:0;padding:0;border:none}
.proc-actions{display:flex;gap:6px}
.proc-btn{height:30px;padding:0 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-family:'Sora',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.proc-btn:hover{border-color:var(--olive);color:var(--olive)}
.proc-btn.mic-on{background:var(--brown);border-color:var(--brown);color:#fff;animation:pulse-mic .8s infinite}
.proc-btn.save-btn{background:var(--olive);border-color:var(--olive);color:#fff}
@keyframes pulse-mic{0%,100%{opacity:1}50%{opacity:.65}}

.steps-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.step-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface2);border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--olive);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text-input{flex:1;border:none;background:transparent;font-family:'Sora',sans-serif;font-size:13px;color:var(--text);resize:none;outline:none;min-height:20px;line-height:1.5}
.step-text-input::placeholder{color:var(--text3)}
.step-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;transition:color .15s}
.step-del:hover{color:#c0392b}
.add-step-row{display:flex;gap:6px}
.add-step-input{flex:1;height:38px;border:1.5px dashed var(--border);border-radius:10px;padding:0 12px;font-size:13px;font-family:'Sora',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s}
.add-step-input:focus{border-color:var(--olive);border-style:solid}
.add-step-btn{height:38px;padding:0 14px;background:var(--olive);border:none;border-radius:10px;color:#fff;font-size:18px;cursor:pointer;font-family:'Sora',sans-serif;flex-shrink:0;transition:background .15s}
.add-step-btn:active{background:var(--olive-dark)}
.proc-empty{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:16px 0}

/* BOTONES ACCION FOOTER */
.d-footer{padding:14px 18px 24px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.action-btn{flex:1;min-width:120px;height:42px;border-radius:12px;border:none;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.action-btn.pdf-btn{background:var(--brown-dark);color:#fff}
.action-btn.pdf-btn:hover{background:#5a3820}
.action-btn.excel-btn{background:#1d6f42;color:#fff}
.action-btn.excel-btn:hover{background:#165a35}

/* PRINT */
@media print{
  #login-view,#list-view,.d-hdr,.d-footer,.scaler-bar,.step-del,.add-step-row,.proc-actions{display:none!important}
  #detail-view{position:static!important;transform:none!important;box-shadow:none!important;height:auto!important}
  .d-scroll{overflow:visible!important;height:auto!important}
  .d-hero{background:var(--olive)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{overflow:visible!important}
  .step-text-input{border:none!important;background:transparent!important}
  .step-item{break-inside:avoid}
}

.ing-merma{font-size:9px;color:var(--olive);background:rgba(125,130,95,0.12);
  border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:600;letter-spacing:.3px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--beige2);border-radius:2px}
</style>
</head>

const PINS_VALIDOS = ["1234","5678","9999","2025"];
let activeCategories = new Set();

function doLogin(){
  const pin = document.getElementById('pin-input').value.trim();
  const err = document.getElementById('login-err');
  if(!pin){err.textContent='Ingresa tu PIN';return}
  if(PINS_VALIDOS.includes(pin)){
    err.textContent='';
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('list-view').style.display='flex';
    initList();
  } else {
    err.textContent='PIN incorrecto. Inténtalo de nuevo.';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-input').focus();
  }
}
function doLogout(){
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('list-view').style.display='none';
  document.getElementById('pin-input').value='';
  activeCategories.clear();
}
document.getElementById('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function initList(){
  const cats = [...new Set(RECETAS.map(r=>r.categoria))].sort();
  document.getElementById('chips-container').innerHTML = cats.map(c=>
    `<div class="chip" data-cat="${c}" onclick="toggleCat('${c}')">${c}</div>`
  ).join('');
  renderList();
}
function toggleCat(cat){
  if(activeCategories.has(cat)) activeCategories.delete(cat);
  else activeCategories.add(cat);
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',activeCategories.has(ch.dataset.cat)));
  renderList();
}
function toggleFilter(){
  const drawer=document.getElementById('filter-drawer');
  const btn=document.getElementById('filter-toggle');
  const isOpen=drawer.classList.toggle('open');
  btn.classList.toggle('on',isOpen);
  btn.textContent=isOpen?'✕ Cerrar':'⚙ Filtros';
}
function renderList(){
  const q=document.getElementById('search-inp').value.toLowerCase().trim();
  let filtered=RECETAS;
  if(activeCategories.size>0) filtered=filtered.filter(r=>activeCategories.has(r.categoria));
  if(q) filtered=filtered.filter(r=>r.nombre.toLowerCase().includes(q)||r.categoria.toLowerCase().includes(q)||(r.subcategoria||'').toLowerCase().includes(q)||r.ingredientes.some(i=>i.nombre.toLowerCase().includes(q)));
  document.getElementById('res-bar').textContent=`${filtered.length} receta${filtered.length!==1?'s':''} encontrada${filtered.length!==1?'s':''}`;
  const grid=document.getElementById('recipe-grid');
  if(filtered.length===0){grid.innerHTML=`<div class="empty"><div class="empty-icon">🍽️</div><p>No se encontraron recetas</p></div>`;return}
  grid.innerHTML=filtered.map(r=>`
    <div class="card" onclick="openDetail(${r.id})">
      <div class="card-cat">${r.categoria}</div>
      <div class="card-name">${r.nombre}</div>
      <div class="card-meta">🧂 ${r.ingredientes.length} ingredientes · ${r.rendimiento} ${r.unidad}</div>
    </div>`).join('');
}
function openDetail(id){
  const r=RECETAS.find(x=>x.id===id);if(!r)return;
  document.getElementById('d-title').textContent=r.nombre;
  document.getElementById('d-cat').textContent=`${r.categoria}${r.subcategoria?' · '+r.subcategoria:''}`;
  document.getElementById('d-badges').innerHTML=`
    <div class="badge">🍽️ ${r.rendimiento} ${r.unidad}</div>
    <div class="badge">🧂 ${r.ingredientes.length} ingredientes</div>
    ${r.metodo&&r.metodo.length?`<div class="badge">📋 ${r.metodo.length} pasos</div>`:''}`;
  window._recetaActual = r;
  window._factorEscala = 1;
  renderIngredientes(r, 1);

  // Cargar procedimiento guardado
  _recetaKey = r.id;
  renderSteps(r.id);
  document.getElementById('new-step-input').value = '';
  stopMic();
  var dv = document.getElementById('detail-view');
  dv.style.display = 'flex';
  dv.classList.add('open');
  document.querySelector('.d-scroll').scrollTop=0;
}
function renderIngredientes(r, factor){
  document.getElementById('d-yield').innerHTML = 
    '<div class="scaler-bar">' +
      '<div class="scaler-title">\u2696\uFE0F Escalar receta</div>' +
      '<div class="scaler-row">' +
        '<button class="scaler-btn" onclick="cambiarFactor(-1)">\u2212</button>' +
        '<input class="scaler-input" id="factor-input" type="number" min="0.25" step="0.25" value="' + factor + '" onchange="aplicarFactor()">' +
        '<div class="scaler-result">\u00D7 ' + factor + ' &rarr; ' + parseFloat((r.rendimiento*factor).toFixed(2)) + ' ' + r.unidad + '</div>' +
        '<button class="scaler-btn" onclick="cambiarFactor(1)">+</button>' +
      '</div>' +
    '</div>' +
    '<div class="yield-bar"><span class="yield-label">Rendimiento base</span><span class="yield-val">' + r.rendimiento + '<span class="yield-unit"> ' + r.unidad + '</span></span></div>';
  document.getElementById('d-ing-table').innerHTML = r.ingredientes.map(function(i){
    var qty = i.cantidad > 0 ? parseFloat((i.cantidad * factor).toFixed(3)) : 0;
    var qtyStr = qty > 0 ? (qty % 1 === 0 ? qty.toString() : qty.toFixed(2)) : '';
    var mermaStr = (i.merma && i.merma > 0 && factor === 1) ? '<span class="ing-merma" title="Merma: ' + i.merma + i.unidad + '"> ✓crudo</span>' : '';
    return '<tr><td>' + i.nombre + mermaStr + '</td><td>' + (qty > 0 ? '<strong>' + qtyStr + '</strong><span class="ing-qty"> ' + i.unidad + '</span>' : '<span class="ing-qty">' + i.unidad + '</span>') + '</td></tr>';
  }).join('');
}
function cambiarFactor(delta){
  var input = document.getElementById('factor-input');
  var f = parseFloat(input.value) || 1;
  f = Math.max(0.25, parseFloat((f + delta * 0.25).toFixed(2)));
  if(delta > 0 && f > 1) f = Math.round(f);
  if(delta < 0 && f >= 1) f = Math.round(f);
  input.value = f;
  window._factorEscala = f;
  renderIngredientes(window._recetaActual, f);
}
function aplicarFactor(){
  var f = Math.max(0.25, parseFloat(document.getElementById('factor-input').value) || 1);
  window._factorEscala = f;
  renderIngredientes(window._recetaActual, f);
}

/* ===== PROCEDIMIENTO ===== */
var _recetaKey = '';
var _recognition = null;
var _micOn = false;
var _micStepTarget = null; // índice del paso activo o null=nuevo

function getProcKey(id){ return 'cg_proc_' + id; }

function loadSteps(recetaId){
  try{ return JSON.parse(localStorage.getItem(getProcKey(recetaId))) || []; }
  catch(e){ return []; }
}
function saveSteps(recetaId, steps){
  localStorage.setItem(getProcKey(recetaId), JSON.stringify(steps));
}

function renderSteps(recetaId){
  var steps = loadSteps(recetaId);
  var list = document.getElementById('steps-list');
  if(steps.length === 0){
    list.innerHTML = '<div class="proc-empty">Sin pasos aún. Agrega el primero abajo o usa el dictado por voz.</div>';
    return;
  }
  list.innerHTML = steps.map(function(s, i){
    return '<div class="step-item" id="step-item-'+i+'">' +
      '<div class="step-num">'+(i+1)+'</div>' +
      '<textarea class="step-text-input" rows="1" oninput="autoResize(this);updateStep('+i+',this.value)" onfocus="setMicTarget('+i+')" onblur="setMicTarget(null)">' + escHtml(s) + '</textarea>' +
      '<button class="step-del" onclick="deleteStep('+i+')" title="Eliminar">×</button>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.step-text-input').forEach(autoResize);
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

function setMicTarget(idx){ _micStepTarget = idx; }

function updateStep(idx, val){
  var steps = loadSteps(_recetaKey);
  steps[idx] = val;
  saveSteps(_recetaKey, steps);
}

function addStep(){
  var inp = document.getElementById('new-step-input');
  var val = inp.value.trim();
  if(!val) return;
  var steps = loadSteps(_recetaKey);
  steps.push(val);
  saveSteps(_recetaKey, steps);
  inp.value = '';
  renderSteps(_recetaKey);
}

function deleteStep(idx){
  var steps = loadSteps(_recetaKey);
  steps.splice(idx, 1);
  saveSteps(_recetaKey, steps);
  renderSteps(_recetaKey);
}

/* ===== DICTADO POR VOZ ===== */
function toggleMic(){
  var btn = document.getElementById('mic-btn');
  if(_micOn){ stopMic(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('Tu navegador no soporta dictado por voz. Usa Chrome.'); return; }
  _recognition = new SR();
  _recognition.lang = 'es-ES';
  _recognition.continuous = true;
  _recognition.interimResults = false;
  _recognition.onresult = function(e){
    var transcript = e.results[e.results.length-1][0].transcript.trim();
    // Detectar comando "nuevo paso"
    if(/nuevo paso/i.test(transcript)){
      // Guardar lo anterior y crear nuevo paso
      var steps = loadSteps(_recetaKey);
      steps.push('');
      saveSteps(_recetaKey, steps);
      _micStepTarget = steps.length - 1;
      renderSteps(_recetaKey);
      return;
    }
    var steps = loadSteps(_recetaKey);
    if(_micStepTarget !== null && _micStepTarget < steps.length){
      steps[_micStepTarget] = (steps[_micStepTarget] ? steps[_micStepTarget] + ' ' : '') + transcript;
    } else {
      steps.push(transcript);
      _micStepTarget = steps.length - 1;
    }
    saveSteps(_recetaKey, steps);
    renderSteps(_recetaKey);
  };
  _recognition.onerror = function(){ stopMic(); };
  _recognition.onend = function(){ if(_micOn) _recognition.start(); };
  _recognition.start();
  _micOn = true;
  btn.textContent = '🔴 Detener';
  btn.classList.add('mic-on');
}

function stopMic(){
  if(_recognition){ try{ _recognition.stop(); }catch(e){} }
  _micOn = false;
  _micStepTarget = null;
  var btn = document.getElementById('mic-btn');
  if(btn){ btn.textContent = '🎙 Dictar'; btn.classList.remove('mic-on'); }
}

/* ===== PDF / PRINT ===== */
function imprimirPDF(){
  stopMic();
  // Ocultar textareas y mostrar como texto plano para impresión
  document.querySelectorAll('.step-text-input').forEach(function(el){
    el.style.fontFamily = "'Sora', sans-serif";
    el.style.fontSize = '13px';
  });
  window.print();
}

/* ===== EXCEL ===== */
function exportarExcel(){
  stopMic();
  var r = window._recetaActual;
  if(!r) return;
  var factor = window._factorEscala || 1;
  var steps = loadSteps(_recetaKey);

  // Construir CSV con BOM para Excel
  var rows = [];
  rows.push(['RECETARIO CASA GUSTO']);
  rows.push([]);
  rows.push(['RECETA:', r.nombre]);
  rows.push(['CATEGORÍA:', r.categoria]);
  rows.push(['SUBCATEGORÍA:', r.subcategoria || '']);
  rows.push(['RENDIMIENTO BASE:', r.rendimiento, r.unidad]);
  rows.push(['FACTOR DE ESCALA:', factor]);
  rows.push(['RENDIMIENTO ESCALADO:', parseFloat((r.rendimiento * factor).toFixed(2)), r.unidad]);
  rows.push([]);
  rows.push(['INGREDIENTES (PESO CRUDO)']);
  rows.push(['Ingrediente', 'Cantidad', 'Unidad', 'Merma (g)']);
  r.ingredientes.forEach(function(ing){
    var qty = ing.cantidad > 0 ? parseFloat((ing.cantidad * factor).toFixed(3)) : '';
    rows.push([ing.nombre, qty, ing.unidad, ing.merma || 0]);
  });
  if(steps.length > 0){
    rows.push([]);
    rows.push(['PROCEDIMIENTO']);
    steps.forEach(function(s, i){
      rows.push(['Paso ' + (i+1), s]);
    });
  }

  var csv = '﻿' + rows.map(function(r){
    return r.map(function(c){
      var s = String(c === null || c === undefined ? '' : c);
      if(s.includes(',') || s.includes('"') || s.includes('\n')) s = '"' + s.replace(/"/g,'""') + '"';
      return s;
    }).join(',');
  }).join('\n');

  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = r.nombre.replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function closeDetail(){
  stopMic();
  var dv = document.getElementById('detail-view');
  dv.classList.remove('open');
  dv.style.display = 'none';;
}
let touchStartX=0;
document.getElementById('detail-view').addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX},{passive:true});
document.getElementById('detail-view').addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-touchStartX>80)closeDetail()},{passive:true});
</script>
